services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: lexease
      POSTGRES_USER: lexease
      POSTGRES_PASSWORD: lexease
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexease -d lexease"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
