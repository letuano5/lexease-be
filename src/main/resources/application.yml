spring:
  application:
    name: lexease-be
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lexease}
    username: ${DB_USERNAME:lexease}
    password: ${DB_PASSWORD:lexease}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

lexease:
  security:
    jwt:
      issuer: ${JWT_ISSUER:lexease}
      access-secret: ${JWT_ACCESS_SECRET:dev-only-change-this-secret-at-least-32-bytes}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token:
      pepper: ${JWT_REFRESH_PEPPER:dev-only-refresh-pepper-change-me}
      ttl: ${JWT_REFRESH_TOKEN_TTL:30d}
  object-storage:
    mode: ${OBJECT_STORAGE_MODE:local}
    local-root: ${OBJECT_STORAGE_LOCAL_ROOT:build/lexease-storage}
    public-base-url: ${OBJECT_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
    signing-secret: ${OBJECT_STORAGE_SIGNING_SECRET:dev-only-storage-signing-secret}
    read-url-ttl: ${OBJECT_STORAGE_READ_URL_TTL:15m}
  tts:
    base-url: ${TTS_BASE_URL:http://localhost:6543}
    callback-base-url: ${TTS_CALLBACK_BASE_URL:http://localhost:8080}
    callback-secret: ${TTS_CALLBACK_SECRET:dev-secret-change-me}
    mode: ${TTS_MODE:ASYNC}
    provider: ${TTS_PROVIDER:vieneu-tts}
    default-voice: ${TTS_DEFAULT_VOICE:Binh}
    audio-format: ${TTS_AUDIO_FORMAT:wav}
    language: ${TTS_LANGUAGE:vi-VN}
    callback-timestamp-tolerance: ${TTS_CALLBACK_TIMESTAMP_TOLERANCE:5m}
    max-word-count-mismatch-ratio: ${TTS_MAX_WORD_COUNT_MISMATCH_RATIO:0.10}
    auto-generate-on-publish: ${TTS_AUTO_GENERATE_ON_PUBLISH:true}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  scoring:
    base-url: ${SCORING_BASE_URL:http://localhost:6543}
    mode: ${SCORING_MODE:ASYNC}
    provider: ${SCORING_PROVIDER:gemini}
    model: ${SCORING_MODEL:gemini-3.1-flash-lite}
    prompt-version: ${SCORING_PROMPT_VERSION:reading-evaluation-v1}
    callback-base-url: ${SCORING_CALLBACK_BASE_URL:http://localhost:8080}
    recording-retention: ${SCORING_RECORDING_RETENTION:30d}
  notifications:
    firebase:
      project-id: ${FIREBASE_PROJECT_ID:}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    opened-on-time-window: ${NOTIFICATIONS_OPENED_ON_TIME_WINDOW:15m}
    ignored-after: ${NOTIFICATIONS_IGNORED_AFTER:24h}
    scheduler:
      enabled: ${NOTIFICATIONS_SCHEDULER_ENABLED:true}
