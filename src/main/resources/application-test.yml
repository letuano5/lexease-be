spring:
  datasource:
    url: jdbc:h2:mem:lexease-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

lexease:
  security:
    jwt:
      access-secret: test-only-access-secret-at-least-32-bytes
    refresh-token:
      pepper: test-only-refresh-pepper
  object-storage:
    local-root: build/test-lexease-storage
    signing-secret: test-storage-signing-secret
  tts:
    callback-base-url: http://localhost:8080
    callback-secret: test-tts-callback-secret
    auto-generate-on-publish: false
  scoring:
    callback-base-url: http://localhost:8080
